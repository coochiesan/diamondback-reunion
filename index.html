<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VF-102 DiamondBacks — 2027 Reunion Date Poll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dark: #8A6A1F;
    --navy: #0A1628;
    --navy-mid: #152238;
    --navy-light: #1E3454;
    --white: #F4F1EB;
    --muted: #8A95A8;
    --preferred: #2ECC8F;
    --preferred-bg: rgba(46,204,143,0.12);
    --available: #4A9FD4;
    --available-bg: rgba(74,159,212,0.12);
    --conflict: #E05C5C;
    --conflict-bg: rgba(224,92,92,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  .header {
    background: var(--navy-mid);
    border-bottom: 1px solid rgba(201,168,76,0.3);
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .squadron-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 6vw, 48px);
    letter-spacing: 0.05em;
    color: var(--white);
    line-height: 1;
    margin-bottom: 6px;
  }

  .header h1 span { color: var(--gold); }

  .header-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .diamond-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 1rem 0 0;
  }

  .diamond-divider::before,
  .diamond-divider::after {
    content: '';
    flex: 1;
    max-width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dark));
  }

  .diamond-divider::after {
    background: linear-gradient(90deg, var(--gold-dark), transparent);
  }

  .diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  .container {
    max-width: 620px;
    margin: 0 auto;
    padding: 0 1.25rem;
  }

  .section {
    margin-top: 2rem;
  }

  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  .name-card {
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .name-card label {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
  }

  .name-card input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(201,168,76,0.3);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    padding: 4px 0;
    outline: none;
  }

  .name-card input::placeholder { color: rgba(138,149,168,0.5); }
  .name-card input:focus { border-bottom-color: var(--gold); }

  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .leg {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .leg-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .option-card {
    background: var(--navy-mid);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .option-card:hover { border-color: rgba(201,168,76,0.2); }

  .opt-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .opt-id {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--gold);
    line-height: 1;
  }

  .opt-dates {
    font-size: 15px;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 2px;
  }

  .opt-detail {
    font-size: 12px;
    color: var(--muted);
  }

  .my-vote-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    display: none;
  }

  .my-vote-badge.preferred { background: var(--preferred-bg); color: var(--preferred); display: inline-block; }
  .my-vote-badge.available { background: var(--available-bg); color: var(--available); display: inline-block; }
  .my-vote-badge.conflict { background: var(--conflict-bg); color: var(--conflict); display: inline-block; }

  .vote-btns {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .vbtn {
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 400;
  }

  .vbtn:hover { border-color: rgba(255,255,255,0.25); color: var(--white); }

  .vbtn.active-preferred { background: var(--preferred-bg); border-color: var(--preferred); color: var(--preferred); }
  .vbtn.active-available { background: var(--available-bg); border-color: var(--available); color: var(--available); }
  .vbtn.active-conflict { background: var(--conflict-bg); border-color: var(--conflict); color: var(--conflict); }
  .vbtn.clear-btn { font-size: 11px; padding: 6px 10px; color: rgba(138,149,168,0.5); border-color: transparent; }
  .vbtn.clear-btn:hover { color: var(--muted); border-color: rgba(255,255,255,0.1); }

  .bars { display: flex; flex-direction: column; gap: 6px; }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .bar-label {
    font-size: 11px;
    color: var(--muted);
    min-width: 58px;
    text-transform: capitalize;
  }

  .bar-track {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }

  .bar-fill {
    height: 6px;
    border-radius: 4px;
    transition: width 0.4s ease;
    min-width: 0;
  }

  .bar-fill.preferred { background: var(--preferred); }
  .bar-fill.available { background: var(--available); }
  .bar-fill.conflict { background: var(--conflict); }

  .bar-info {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 90px;
    justify-content: flex-end;
  }

  .bar-count {
    font-size: 12px;
    font-weight: 500;
    color: var(--white);
    min-width: 16px;
    text-align: right;
  }

  .bar-names {
    font-size: 10px;
    color: rgba(138,149,168,0.6);
    margin-top: 1px;
    padding-left: 68px;
    min-height: 14px;
    line-height: 1.4;
  }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 1.5rem;
  }

  .submit-btn:hover { background: var(--gold-light); }
  .submit-btn:active { transform: scale(0.99); }

  .status {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 1rem;
    display: none;
  }

  .status.success { background: var(--preferred-bg); color: var(--preferred); border: 1px solid rgba(46,204,143,0.25); display: block; }
  .status.danger { background: var(--conflict-bg); color: var(--conflict); border: 1px solid rgba(224,92,92,0.25); display: block; }

  .results-card {
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 12px;
    padding: 1.25rem;
    margin-top: 2rem;
  }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .results-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--gold);
  }

  .refresh-btn {
    font-size: 11px;
    padding: 4px 12px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  .refresh-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--white); }

  .results-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .results-row:last-of-type { border-bottom: none; margin-bottom: 0; }

  .results-row .opt-tag {
    font-weight: 500;
    color: var(--white);
    font-size: 13px;
  }

  .tally {
    display: flex;
    gap: 10px;
    font-size: 11px;
  }

  .tally-item { display: flex; align-items: center; gap: 4px; }

  .leader-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.25);
    color: var(--gold);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    margin-top: 12px;
  }

  .responded-section {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .responded-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .responded-names {
    font-size: 11px;
    color: rgba(138,149,168,0.7);
    line-height: 1.7;
  }

  .not-responded {
    font-size: 11px;
    color: rgba(224,92,92,0.6);
    margin-top: 4px;
    line-height: 1.7;
  }

  @media (max-width: 480px) {
    .tally { flex-direction: column; gap: 4px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="squadron-label">VF-102 · United States Navy</div>
  <h1>Diamond<span>backs</span></h1>
  <div class="header-sub">25th Anniversary Reunion · Key West, Florida · 2027</div>
  <div class="diamond-divider"><div class="diamond"></div></div>
</div>

<div class="container">

  <div class="section">
    <div class="section-label">Date Poll</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:1.25rem;line-height:1.6;">Rate each option below — Preferred, Available, or Hard Conflict. Results update live for the whole crew.</p>

    <div id="status-msg" class="status"></div>

    <div class="name-card" style="margin-bottom:1.25rem;">
      <label>Your name</label>
      <input type="text" id="voter-name" placeholder="First name or callsign" autocomplete="off" />
    </div>

    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--preferred)"></div>Preferred</div>
      <div class="leg"><div class="leg-dot" style="background:var(--available)"></div>Available</div>
      <div class="leg"><div class="leg-dot" style="background:var(--conflict)"></div>Hard conflict</div>
    </div>

    <div id="options-list"></div>

    <button class="submit-btn" onclick="submitVote()">Submit My Votes</button>
  </div>

  <div class="results-card">
    <div class="results-header">
      <div class="results-title">Live Results</div>
      <button class="refresh-btn" onclick="loadVotes()">Refresh</button>
    </div>
    <div id="summary-content"></div>
  </div>

</div>

<script>
const STORAGE_KEY = 'db_poll_v3';
const ALL_NAMES = ['Mark Wralstad','Roy Kelly','Mike Vizcarra','Scott Guimond','Tom Eberhard','William Ewald','Eric Phipps','Scott Ind','Dave Harris','Jack Freeman','JJ Cummings','Rich Simpson','John Depree','Mike Doxey','Jay Hildebrand','Chad Mingo','Zach Mosedale','Trevor Sterry','Sara Redmer','Matt Chasteen','John Lynch','Derek Nalewajko','Brian Downey','Bill Yoder','Dan Quinn','Don Moseley','Matt Morgan','Roy Wylie','Andy Hayes','Gunner Palm'];

const OPTIONS = [
  {id:'A', label:'Option A', dates:'March 24–28, 2027', detail:'Wednesday through Sunday'},
  {id:'B', label:'Option B', dates:'March 26–30, 2027', detail:'Friday through Tuesday'},
  {id:'C', label:'Option C', dates:'March 31 – April 4, 2027', detail:'Tuesday through Saturday'},
];

const STATUSES = ['preferred','available','conflict'];
let myVotes = {A:null,B:null,C:null};
let allVotes = {};

function renderOptions(){
  const total = Object.keys(allVotes).length;
  document.getElementById('options-list').innerHTML = OPTIONS.map(o => {
    const counts = {preferred:0,available:0,conflict:0};
    const voterNames = {preferred:[],available:[],conflict:[]};
    Object.entries(allVotes).forEach(([name,votes]) => {
      const s = votes[o.id];
      if(s && counts[s]!==undefined){ counts[s]++; voterNames[s].push(name); }
    });
    const maxCount = Math.max(total,1);
    const myStatus = myVotes[o.id];
    const badgeHtml = myStatus ? `<span class="my-vote-badge ${myStatus}">My vote: ${myStatus}</span>` : '';

    const btnHtml = STATUSES.map(s =>
      `<button class="vbtn${myStatus===s?' active-'+s:''}" onclick="setVote('${o.id}','${s}')">${s.charAt(0).toUpperCase()+s.slice(1)}</button>`
    ).join('') + (myStatus ? `<button class="vbtn clear-btn" onclick="setVote('${o.id}',null)">Clear</button>` : '');

    const barsHtml = STATUSES.map(s => {
      const pct = Math.round((counts[s]/maxCount)*100);
      const names = voterNames[s].slice(0,7).join(', ')+(voterNames[s].length>7?` +${voterNames[s].length-7} more`:'');
      return `<div class="bar-row">
        <span class="bar-label">${s}</span>
        <div class="bar-track"><div class="bar-fill ${s}" style="width:${pct}%"></div></div>
        <div class="bar-info"><span class="bar-count">${counts[s]}</span></div>
      </div>${names?`<div class="bar-names">${names}</div>`:''}`;
    }).join('');

    return `<div class="option-card">
      <div class="opt-header">
        <div>
          <div class="opt-id">${o.label}</div>
          <div class="opt-dates">${o.dates}</div>
          <div class="opt-detail">${o.detail}</div>
        </div>
        ${badgeHtml}
      </div>
      <div class="vote-btns">${btnHtml}</div>
      <div class="bars">${barsHtml}</div>
    </div>`;
  }).join('');
}

function renderSummary(){
  const total = Object.keys(allVotes).length;
  let bestOption = null, bestScore = -999;
  const rows = OPTIONS.map(o => {
    let p=0,a=0,c=0;
    Object.values(allVotes).forEach(v => {
      if(v[o.id]==='preferred') p++;
      else if(v[o.id]==='available') a++;
      else if(v[o.id]==='conflict') c++;
    });
    const score = p*3 + a*1 + c*-2;
    if(score > bestScore){ bestScore=score; bestOption=o; }
    return `<div class="results-row">
      <span class="opt-tag">${o.label} — ${o.dates}</span>
      <div class="tally">
        <span class="tally-item" style="color:var(--preferred);">${p} pref</span>
        <span class="tally-item" style="color:var(--available);">${a} avail</span>
        <span class="tally-item" style="color:var(--conflict);">${c} conflict</span>
      </div>
    </div>`;
  }).join('');

  const responded = Object.keys(allVotes);
  const notResponded = ALL_NAMES.filter(n => !responded.some(r => r.toLowerCase().includes(n.split(' ')[0].toLowerCase()) || n.toLowerCase().includes(r.toLowerCase())));

  const leaderHtml = total > 0 && bestOption
    ? `<div class="leader-badge"><div class="diamond" style="width:6px;height:6px;background:var(--gold);transform:rotate(45deg);"></div>Leading: ${bestOption.label} — ${bestOption.dates}</div>`
    : `<div style="font-size:12px;color:var(--muted);margin-top:8px;">No votes yet — be the first!</div>`;

  const respondedHtml = responded.length > 0
    ? `<div class="responded-section">
        <div class="responded-label">Responded (${responded.length}/30)</div>
        <div class="responded-names">${responded.join(' · ')}</div>
      </div>`
    : '';

  document.getElementById('summary-content').innerHTML =
    `<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">${total} of 30 responded</div>`
    + rows + leaderHtml + respondedHtml;
}

function setVote(optId, status){
  myVotes[optId] = status;
  renderOptions();
}

function showStatus(msg, type){
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status ' + type;
  setTimeout(() => el.className='status', 4000);
}

async function submitVote(){
  const name = document.getElementById('voter-name').value.trim();
  if(!name){ showStatus('Please enter your name or callsign.', 'danger'); return; }
  if(!Object.values(myVotes).some(v=>v!==null)){ showStatus('Please rate at least one date option.', 'danger'); return; }
  allVotes[name] = {...myVotes};
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allVotes));
    showStatus('Vote saved — thanks, ' + name + '!', 'success');
    renderOptions();
    renderSummary();
  }catch(e){ showStatus('Could not save vote.', 'danger'); }
}

async function loadVotes(){
  try{
    const s = localStorage.getItem(STORAGE_KEY);
    if(s) allVotes = JSON.parse(s);
  }catch(e){ allVotes = {}; }
  renderOptions();
  renderSummary();
}

loadVotes();
</script>
</body>
</html>
