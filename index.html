<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiamondBacks Poll — Test</title>
</head>
<body style="background:#0A1628;color:#F4F1EB;font-family:sans-serif;padding:2rem;max-width:600px;margin:0 auto;">

<h1 style="color:#C9A84C;margin-bottom:1rem;">VF-102 DiamondBacks — Date Poll</h1>
<p style="color:#8A95A8;margin-bottom:2rem;">Rate each option below then submit.</p>

<div id="debug" style="background:#152238;padding:1rem;border-radius:8px;margin-bottom:1rem;font-size:12px;color:#8A95A8;"></div>

<div>
  <label style="display:block;margin-bottom:0.5rem;color:#8A95A8;font-size:13px;">Your name or callsign</label>
  <input id="voter-name" type="text" placeholder="e.g. Coochie" style="width:100%;padding:10px;background:#152238;border:1px solid rgba(201,168,76,0.3);border-radius:8px;color:#F4F1EB;font-size:15px;margin-bottom:1.5rem;" />
</div>

<div id="options-list"></div>

<div style="background:#152238;border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:1.25rem;margin-bottom:1rem;">
  <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
    <input type="checkbox" id="other-check" onchange="toggleOther()" style="width:16px;height:16px;accent-color:#C9A84C;" />
    <span style="font-size:14px;font-weight:500;">None of these work — suggest a date</span>
  </label>
  <div id="other-wrap" style="display:none;margin-top:12px;">
    <textarea id="other-text" rows="2" placeholder="e.g. April 10-14 works better..." style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.25);border-radius:8px;color:#F4F1EB;font-size:14px;padding:10px;resize:none;"></textarea>
  </div>
</div>

<button onclick="submitVote()" style="width:100%;padding:14px;background:#C9A84C;color:#0A1628;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:1rem;">Submit My Votes</button>

<div id="status" style="padding:10px;border-radius:8px;margin-bottom:1rem;display:none;"></div>

<div style="background:#152238;border:1px solid rgba(201,168,76,0.15);border-radius:12px;padding:1.25rem;margin-top:1rem;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <strong style="color:#C9A84C;font-size:13px;letter-spacing:0.1em;">LIVE RESULTS</strong>
    <button onclick="loadVotes()" style="font-size:11px;padding:4px 12px;background:transparent;border:1px solid rgba(255,255,255,0.15);color:#8A95A8;border-radius:6px;cursor:pointer;">Refresh</button>
  </div>
  <div id="results"></div>
</div>

<script>
var DB = 'https://diamondbacks-reunion-default-rtdb.firebaseio.com/votes';

var OPTIONS = [
  {id:'A', label:'Option A', dates:'March 24-28, 2027', detail:'Wednesday through Sunday'},
  {id:'B', label:'Option B', dates:'March 26-30, 2027', detail:'Friday through Tuesday'},
  {id:'C', label:'Option C', dates:'March 31 - April 4, 2027', detail:'Tuesday through Saturday'}
];

var STATUSES = ['preferred','available','conflict'];
var COLORS = {preferred:'#2ECC8F', available:'#4A9FD4', conflict:'#E05C5C'};
var myVotes = {A:null, B:null, C:null};
var allVotes = {};

document.getElementById('debug').textContent = 'Script loaded. Options count: ' + OPTIONS.length;

function toggleOther(){
  var checked = document.getElementById('other-check').checked;
  document.getElementById('other-wrap').style.display = checked ? 'block' : 'none';
}

function setVote(optId, status){
  myVotes[optId] = status;
  renderOptions();
}

function renderOptions(){
  var total = Object.keys(allVotes).length;
  var html = '';
  for(var i=0; i<OPTIONS.length; i++){
    var o = OPTIONS[i];
    var counts = {preferred:0, available:0, conflict:0};
    var names = {preferred:[], available:[], conflict:[]};
    var keys = Object.keys(allVotes);
    for(var k=0; k<keys.length; k++){
      var v = allVotes[keys[k]];
      var s = v.votes && v.votes[o.id];
      if(s && counts[s]!==undefined){ counts[s]++; names[s].push(keys[k]); }
    }
    var myS = myVotes[o.id];
    var btnHtml = '';
    for(var j=0; j<STATUSES.length; j++){
      var s = STATUSES[j];
      var active = myS===s;
      btnHtml += '<button onclick="setVote(\''+o.id+'\',\''+s+'\')" style="padding:6px 14px;font-size:12px;border-radius:6px;border:1px solid '+(active?COLORS[s]:'rgba(255,255,255,0.12)')+';background:'+(active?'rgba('+hexToRgb(COLORS[s])+',0.12)':'transparent')+';color:'+(active?COLORS[s]:'#8A95A8')+';cursor:pointer;margin-right:6px;margin-bottom:6px;">'+s.charAt(0).toUpperCase()+s.slice(1)+'</button>';
    }
    if(myS) btnHtml += '<button onclick="setVote(\''+o.id+'\',null)" style="padding:6px 10px;font-size:11px;border-radius:6px;border:none;background:transparent;color:#8A95A8;cursor:pointer;">Clear</button>';
    var barHtml = '';
    for(var j=0; j<STATUSES.length; j++){
      var s = STATUSES[j];
      var pct = total>0 ? Math.round(counts[s]/total*100) : 0;
      var nms = names[s].slice(0,7).join(', ') + (names[s].length>7?' +more':'');
      barHtml += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">'
        +'<span style="font-size:11px;color:#8A95A8;min-width:58px;text-transform:capitalize;">'+s+'</span>'
        +'<div style="flex:1;background:rgba(255,255,255,0.06);border-radius:4px;height:6px;overflow:hidden;">'
        +'<div style="height:6px;border-radius:4px;background:'+COLORS[s]+';width:'+pct+'%;transition:width 0.3s;"></div></div>'
        +'<span style="font-size:12px;color:#F4F1EB;min-width:16px;text-align:right;">'+counts[s]+'</span></div>'
        +(nms?'<div style="font-size:10px;color:rgba(138,149,168,0.6);padding-left:68px;margin-bottom:4px;">'+nms+'</div>':'');
    }
    html += '<div style="background:#152238;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:1.25rem;margin-bottom:12px;">'
      +'<div style="font-size:20px;font-weight:700;color:#C9A84C;margin-bottom:4px;">'+o.label+'</div>'
      +'<div style="font-size:15px;font-weight:500;margin-bottom:2px;">'+o.dates+'</div>'
      +'<div style="font-size:12px;color:#8A95A8;margin-bottom:12px;">'+o.detail+'</div>'
      +'<div style="margin-bottom:12px;">'+btnHtml+'</div>'
      +'<div>'+barHtml+'</div>'
      +'</div>';
  }
  document.getElementById('options-list').innerHTML = html;
  document.getElementById('debug').textContent = 'Rendered ' + OPTIONS.length + ' options. Votes loaded: ' + Object.keys(allVotes).length;
}

function hexToRgb(hex){
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

function showStatus(msg, color){
  var el = document.getElementById('status');
  el.textContent = msg;
  el.style.background = color==='green' ? 'rgba(46,204,143,0.12)' : 'rgba(224,92,92,0.12)';
  el.style.color = color==='green' ? '#2ECC8F' : '#E05C5C';
  el.style.display = 'block';
  setTimeout(function(){ el.style.display='none'; }, 5000);
}

function loadVotes(){
  fetch(DB + '.json')
    .then(function(r){ return r.json(); })
    .then(function(data){
      allVotes = data || {};
      renderOptions();
      renderResults();
    })
    .catch(function(e){
      document.getElementById('results').innerHTML = '<div style="color:#E05C5C;font-size:13px;">Could not load votes: ' + e.message + '</div>';
    });
}

function renderResults(){
  var total = Object.keys(allVotes).length;
  var html = '<div style="font-size:12px;color:#8A95A8;margin-bottom:12px;">'+total+' of 30 responded</div>';
  var best = null, bestScore = -999;
  for(var i=0; i<OPTIONS.length; i++){
    var o = OPTIONS[i];
    var p=0,a=0,c=0;
    var vals = Object.values(allVotes);
    for(var k=0; k<vals.length; k++){
      var v = vals[k];
      if(!v.votes) continue;
      if(v.votes[o.id]==='preferred') p++;
      else if(v.votes[o.id]==='available') a++;
      else if(v.votes[o.id]==='conflict') c++;
    }
    var score = p*3+a-c*2;
    if(score>bestScore){ bestScore=score; best=o; }
    html += '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.05);">'
      +'<span style="color:#F4F1EB;font-weight:500;">'+o.label+' — '+o.dates+'</span>'
      +'<span><span style="color:#2ECC8F;">'+p+' pref</span> &nbsp;<span style="color:#4A9FD4;">'+a+' avail</span> &nbsp;<span style="color:#E05C5C;">'+c+' conflict</span></span>'
      +'</div>';
  }
  if(best && total>0) html += '<div style="color:#C9A84C;font-size:12px;margin-top:8px;">Leading: '+best.label+' — '+best.dates+'</div>';
  var others = Object.entries(allVotes).filter(function(e){ return e[1].other; });
  if(others.length>0){
    html += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05);">'
      +'<div style="font-size:11px;color:#C9A84C;margin-bottom:8px;">SUGGESTED OTHER DATES ('+others.length+')</div>';
    for(var i=0; i<others.length; i++){
      html += '<div style="font-size:12px;margin-bottom:4px;"><span style="color:#C9A84C;min-width:100px;display:inline-block;">'+others[i][0]+'</span> '+others[i][1].other+'</div>';
    }
    html += '</div>';
  }
  var responded = Object.keys(allVotes);
  if(responded.length>0){
    html += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05);font-size:11px;color:rgba(138,149,168,0.7);">'+responded.join(' · ')+'</div>';
  }
  document.getElementById('results').innerHTML = html;
}

function submitVote(){
  var name = document.getElementById('voter-name').value.trim();
  if(!name){ showStatus('Please enter your name or callsign.','red'); return; }
  var hasVote = myVotes.A||myVotes.B||myVotes.C;
  var otherChecked = document.getElementById('other-check').checked;
  var otherText = document.getElementById('other-text').value.trim();
  if(!hasVote && !otherChecked){ showStatus('Please rate at least one option.','red'); return; }
  if(otherChecked && !otherText){ showStatus('Please enter your suggested date.','red'); return; }
  var safeKey = name.replace(/[.#$\/\[\]]/g,'_');
  var data = {votes:{A:myVotes.A,B:myVotes.B,C:myVotes.C}, other:(otherChecked&&otherText)?otherText:null, timestamp:Date.now()};
  fetch(DB+'/'+safeKey+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      showStatus('Vote saved — thanks, '+name+'!','green');
      loadVotes();
    })
    .catch(function(e){ showStatus('Could not save: '+e.message,'red'); });
}

renderOptions();
loadVotes();
setInterval(loadVotes, 30000);
</script>
</body>
</html>
